<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Праздник дня — Ну..</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            z-index: 0;
        }

        /* Затемнение фона */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .card {
            background: rgba(30, 30, 40, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 30px 25px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 2;
        }

        .title {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFB6C1, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .sub {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 25px;
        }

        .holiday-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            padding: 20px 15px;
            margin-bottom: 25px;
            min-height: 150px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .holiday-name {
            font-size: 22px;
            font-weight: bold;
            color: #FFD966;
            word-break: break-word;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .holiday-desc {
            font-size: 13px;
            color: #ddd;
        }

        .refresh-btn {
            background: #FF6B6B;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #ff5252;
            transform: scale(1.02);
        }

        .avatars-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .avatar-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255,255,255,0.5);
            transition: transform 0.2s ease;
            animation: float 3s ease-in-out infinite;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e94560;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .footer-note {
            font-size: 9px;
            color: #ccc;
            margin-top: 15px;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">Ну..</div>
    <div class="sub">сегодня такой праздник</div>

    <div class="holiday-box" id="holidayBox">
        <div id="holidayContent">
            Загрузка...
        </div>
    </div>

    <button class="refresh-btn" id="refreshBtn">
        <span>🎲</span> Другой праздник
    </button>

    <div class="avatars-container" id="avatarsContainer"></div>
    <div class="footer-note">
        📅 Ваш календарь праздников
    </div>
</div>

<script>
    // ========== ВАША ФОНОВАЯ КАРТИНКА С GITHUB ==========
    // 👇👇👇 ВСТАВЬТЕ ВАШУ ССЫЛКУ ЗДЕСЬ 👇👇👇
    const MY_BACKGROUND = "https://raw.githubusercontent.com/MKtg/blob/main/C00tRE96HCIyorJfkpc3O2_7_N0-LdtdXyLsYzE3BOstMTuvNoZaqnqLR1EWRqNh14O50lq-l_BQvCXgaVBv0_Pa.jpg";
    // ====================================================

    // Устанавливаем фон
    document.body.style.backgroundImage = `url('${MY_BACKGROUND}')`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";

    // База праздников
    const holidaysData = {
        "05.18": [
            "Международный день музеев",
            "Арина Капустница (Рассадница)",
            "Всемирный день вакцины против СПИДа",
            "День памяти жертв депортации народов Крыма",
            "День памяти иконы «Неупиваемая чаша»",
            "День без грязной посуды",
            "День рождения майского жжжжука",
            "День Розовой Пантеры",
            "День сырного суфле"
        ],
        "05.19": [
            "День пионерии", "День рождения Кубика Рубика", "Иов Горошник",
            "День конной авиации", "День подразделений служебно-боевой подготовки МВД РФ",
            "День русской печи", "День пищевой революции", "День парусов на горизонте",
            "Всемирный день борьбы с воспалительными заболеваниями кишечника",
            "Всемирный день борьбы с гепатитом С", "День торта «Devil`s Food Cake»"
        ],
        "05.20": [
            "Всемирный день врача-травматолога", "Всемирный день метрологии",
            "День рождения джинсов", "Купальница", "Всемирный день пчел",
            "День Волги", "Европейский день моря", "День миллионера",
            "День собранной клубники", "День ветряных вертушек",
            "Праздник разливаний", "День пирога «Киш Лорен»"
        ],
        "05.21": [
            "День военного переводчика", "День инвентаризатора (День работника БТИ)",
            "День полярника", "День Тихоокеанского флота ВМФ России",
            "Вознесение Господне", "День защиты от безработицы",
            "Всемирный день культурного разнообразия во имя диалога и развития",
            "Международный день космоса", "Иван Долгий",
            "День работников культуры и искусства – Казахстан", "День официантов и официанток",
            "День музы и вдохновения", "День обмена талисманами", "День клубники со сливками"
        ]
    };

    let currentHolidayIndex = -1;

    function getTodayKey() {
        const today = new Date();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${month}.${day}`;
    }

    function getRandomHoliday() {
        const todayKey = getTodayKey();
        const holidaysList = holidaysData[todayKey];
        
        if (!holidaysList || holidaysList.length === 0) {
            return {
                name: "Сегодня особенных праздников нет",
                description: "Но ты всегда можешь придумать свой! ✨"
            };
        }
        
        let randomIndex;
        do {
            randomIndex = Math.floor(Math.random() * holidaysList.length);
        } while (randomIndex === currentHolidayIndex && holidaysList.length > 1);
        currentHolidayIndex = randomIndex;
        
        return {
            name: `🎉 ${holidaysList[randomIndex]}`,
            description: `Праздник, который стоит отметить!`
        };
    }

    function updateHoliday() {
        const contentDiv = document.getElementById('holidayContent');
        const holiday = getRandomHoliday();
        contentDiv.innerHTML = `
            <div class="holiday-name">${escapeHtml(holiday.name)}</div>
            <div class="holiday-desc">${escapeHtml(holiday.description)}</div>
        `;
    }

    // Аватары
    const contacts = ['@makoklyuy', '@sokolovpeter', '@oldti', '@RNFRI'];
    
    function getAvatarElement(username) {
        const cleanName = username.replace('@', '');
        const container = document.createElement('div');
        container.className = 'avatar-circle';
        
        const img = document.createElement('img');
        img.src = `https://unavatar.io/telegram/${cleanName}`;
        img.alt = username;
        img.onerror = () => {
            const placeholder = document.createElement('div');
            placeholder.className = 'avatar-placeholder';
            placeholder.textContent = cleanName[0] ? cleanName[0].toUpperCase() : '?';
            container.innerHTML = '';
            container.appendChild(placeholder);
        };
        container.appendChild(img);
        return container;
    }

    function loadAvatars() {
        const container = document.getElementById('avatarsContainer');
        container.innerHTML = '';
        contacts.forEach(contact => {
            container.appendChild(getAvatarElement(contact));
        });
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Запуск
    loadAvatars();
    updateHoliday();
    document.getElementById('refreshBtn').addEventListener('click', updateHoliday);

    if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#1a2a3a');
        Telegram.WebApp.setBackgroundColor('#1a2a3a');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ну что там — Ну..</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease;
        }

        /* Затемнение фона для читаемости текста */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 30px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .title {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFB6C1, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .sub {
            font-size: 16px;
            color: #f0f0f0;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .holiday-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            padding: 25px 20px;
            margin-bottom: 20px;
            min-height: 180px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .holiday-name {
            font-size: 24px;
            font-weight: bold;
            color: #FFD966;
            word-break: break-word;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .holiday-desc {
            font-size: 14px;
            color: #f0f0f0;
            margin-top: 12px;
        }

        .holiday-country {
            font-size: 13px;
            color: #FFB6C1;
            margin-top: 15px;
            font-weight: 500;
        }

        .refresh-btn {
            background: #FF6B6B;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .refresh-btn:hover {
            background: #ff5252;
            transform: scale(1.02);
        }

        .footer-note {
            font-size: 10px;
            color: #ccc;
            margin-top: 20px;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #FFB6C1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">Ну..</div>
    <div class="sub">ЗА</div>

    <div class="holiday-box" id="holidayBox">
        <div id="holidayContent">
            <div class="loader"></div>
            <div class="holiday-desc">Ищем праздник в мире...</div>
        </div>
    </div>

    <button class="refresh-btn" id="refreshBtn">
        <span>🎲</span> Случайный праздник
    </button>
    <div class="footer-note">
        📅 Источник: Calendarific • праздники со всего мира
    </div>
</div>

<script>
    const CALENDARIFIC_KEY = "zFoIOvM3hXj4CXcGvwzxsoUhOWhdnmkf";
    
    // Массив фоновых изображений (бесплатные, красивые фото)
    const backgrounds = [
        "https://images.pexels.com/photos/2387793/pexels-photo-2387793.jpeg?auto=compress&cs=tinysrgb&w=1600",
        "https://images.pexels.com/photos/1261728/pexels-photo-1261728.jpeg?auto=compress&cs=tinysrgb&w=1600",
        "https://images.pexels.com/photos/1696479/pexels-photo-1696479.jpeg?auto=compress&cs=tinysrgb&w=1600",
        "https://images.pexels.com/photos/2101866/pexels-photo-2101866.jpeg?auto=compress&cs=tinysrgb&w=1600",
        "https://images.pexels.com/photos/248797/pexels-photo-248797.jpeg?auto=compress&cs=tinysrgb&w=1600",
        "https://images.pexels.com/photos/931007/pexels-photo-931007.jpeg?auto=compress&cs=tinysrgb&w=1600",
        "https://images.pexels.com/photos/1118873/pexels-photo-1118873.jpeg?auto=compress&cs=tinysrgb&w=1600",
        "https://images.pexels.com/photos/1028599/pexels-photo-1028599.jpeg?auto=compress&cs=tinysrgb&w=1600",
        "https://images.pexels.com/photos/2356045/pexels-photo-2356045.jpeg?auto=compress&cs=tinysrgb&w=1600",
        "https://images.pexels.com/photos/1040495/pexels-photo-1040495.jpeg?auto=compress&cs=tinysrgb&w=1600"
    ];
    
    let lastBgIndex = -1;
    
    function setRandomBackground() {
        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * backgrounds.length);
        } while (newIndex === lastBgIndex && backgrounds.length > 1);
        lastBgIndex = newIndex;
        document.body.style.backgroundImage = `url('${backgrounds[newIndex]}')`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
        document.body.style.backgroundAttachment = "fixed";
    }
    
    // Устанавливаем случайный фон при загрузке
    setRandomBackground();
    
    // Список стран
    const countries = [
        "RU", "US", "GB", "DE", "FR", "IT", "ES", "CA", "AU", "BR",
        "IN", "JP", "KR", "MX", "ZA", "EG", "TR", "NL", "SE", "NO",
        "DK", "FI", "PL", "CZ", "AT", "CH", "BE", "PT", "GR"
    ];
    
    const countryNames = {
        "RU": "Россия", "US": "США", "GB": "Великобритания", "DE": "Германия",
        "FR": "Франция", "IT": "Италия", "ES": "Испания", "CA": "Канада",
        "AU": "Австралия", "BR": "Бразилия", "IN": "Индия", "JP": "Япония",
        "KR": "Южная Корея", "MX": "Мексика", "ZA": "ЮАР", "EG": "Египет",
        "TR": "Турция", "NL": "Нидерланды", "SE": "Швеция", "NO": "Норвегия",
        "DK": "Дания", "FI": "Финляндия", "PL": "Польша", "CZ": "Чехия",
        "AT": "Австрия", "CH": "Швейцария", "BE": "Бельгия", "PT": "Португалия",
        "GR": "Греция"
    };

    async function getRandomHoliday() {
        const randomIndex = Math.floor(Math.random() * countries.length);
        const countryCode = countries[randomIndex];
        const countryName = countryNames[countryCode] || countryCode;
        
        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth() + 1;
        const day = today.getDate();
        
        const url = `https://calendarific.com/api/v2/holidays?api_key=${CALENDARIFIC_KEY}&country=${countryCode}&year=${year}&month=${month}&day=${day}`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.meta && data.meta.code === 200) {
                const holidays = data.response.holidays;
                
                if (holidays && holidays.length > 0) {
                    const randomHolidayIndex = Math.floor(Math.random() * holidays.length);
                    const holiday = holidays[randomHolidayIndex];
                    
                    return {
                        success: true,
                        name: holiday.name,
                        description: holiday.description || `Праздник в ${countryName}`,
                        country: countryName
                    };
                } else {
                    return getRandomHoliday();
                }
            } else {
                throw new Error('API вернул ошибку');
            }
        } catch (error) {
            return getLocalHoliday();
        }
    }
    
    function getLocalHoliday() {
        const localHolidays = [
            { name: "Международный день счастья", desc: "Улыбнись и поделись радостью с другими! 😊" },
            { name: "Всемирный день мороженого", desc: "Самое время побаловать себя вкусным десертом 🍦" },
            { name: "День хорошего настроения", desc: "Сегодня точно будет отличный день! 🌈" },
            { name: "Международный день дружбы", desc: "Напиши старым друзьям или обними близких 👫" },
            { name: "День спонтанных решений", desc: "Сделай что-то неожиданное и приятное ✨" },
            { name: "Всемирный день чая", desc: "Завари чашечку ароматного напитка ☕" }
        ];
        const randomIndex = Math.floor(Math.random() * localHolidays.length);
        const holiday = localHolidays[randomIndex];
        return {
            success: true,
            name: holiday.name,
            description: holiday.desc,
            country: "мире"
        };
    }

    async function updateHoliday() {
        const contentDiv = document.getElementById('holidayContent');
        contentDiv.innerHTML = `<div class="loader"></div><div class="holiday-desc">Выбираем случайную страну...</div>`;
        
        // Также меняем фон при обновлении
        setRandomBackground();
        
        const holiday = await getRandomHoliday();
        
        contentDiv.innerHTML = `
            <div class="holiday-name">🎉 ${escapeHtml(holiday.name)}</div>
            <div class="holiday-desc">${escapeHtml(holiday.description)}</div>
            <div class="holiday-country">🌍 ${escapeHtml(holiday.country)}</div>
        `;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    updateHoliday();
    document.getElementById('refreshBtn').addEventListener('click', () => updateHoliday());

    if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    }
</script>
</body>
</html>

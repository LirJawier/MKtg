<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Праздник дня — Ну..</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 30px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .title {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFB6C1, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .sub {
            font-size: 16px;
            color: #b0c4de;
            margin-bottom: 25px;
        }

        .holiday-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            padding: 25px 20px;
            margin-bottom: 20px;
            min-height: 180px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .holiday-name {
            font-size: 24px;
            font-weight: bold;
            color: #FFD966;
            word-break: break-word;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .holiday-desc {
            font-size: 14px;
            color: #9cb8d4;
            margin-top: 12px;
        }

        .refresh-btn {
            background: #FF6B6B;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .refresh-btn:hover {
            background: #ff5252;
            transform: scale(1.02);
        }

        .footer-note {
            font-size: 10px;
            color: #608aac;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">Ну..</div>
    <div class="sub">сегодня такой праздник</div>

    <div class="holiday-box" id="holidayBox">
        <div id="holidayContent">
            Загрузка...
        </div>
    </div>

    <button class="refresh-btn" id="refreshBtn">
        <span>🎲</span> Другой праздник
    </button>
    <div class="footer-note">
        📅 Ваш персональный календарь праздников
    </div>
</div>

<script>
    // Полная база праздников
    const holidaysData = {
        "18.05": [
            "Международный день музеев",
            "Арина Капустница (Рассадница)",
            "Всемирный день вакцины против СПИДа",
            "День памяти жертв депортации народов Крыма",
            "День памяти иконы «Неупиваемая чаша»",
            "День без грязной посуды",
            "День рождения майского жжжжука",
            "День Розовой Пантеры",
            "День сырного суфле"
        ],
        "19.05": [
            "День пионерии",
            "День рождения Кубика Рубика",
            "Иов Горошник",
            "День конной авиации",
            "День подразделений служебно-боевой подготовки МВД РФ",
            "День русской печи",
            "День пищевой революции",
            "День парусов на горизонте",
            "Всемирный день борьбы с воспалительными заболеваниями кишечника",
            "Всемирный день борьбы с гепатитом С",
            "День торта «Devil`s Food Cake»"
        ],
        "20.05": [
            "Всемирный день врача-травматолога",
            "Всемирный день метрологии",
            "День рождения джинсов",
            "Купальница",
            "Всемирный день пчел",
            "День Волги",
            "Европейский день моря",
            "День миллионера",
            "День собранной клубники",
            "День ветряных вертушек",
            "Праздник разливаний",
            "День пирога «Киш Лорен»"
        ],
        "21.05": [
            "День военного переводчика",
            "День инвентаризатора (День работника БТИ)",
            "День полярника",
            "День Тихоокеанского флота ВМФ России",
            "Вознесение Господне",
            "День защиты от безработицы",
            "Всемирный день культурного разнообразия во имя диалога и развития",
            "Международный день космоса",
            "Иван Долгий",
            "День работников культуры и искусства – Казахстан",
            "День официантов и официанток",
            "День музы и вдохновения",
            "День обмена талисманами",
            "День клубники со сливками"
        ]
    };

    let currentHolidayIndex = -1;

    function getTodayKey() {
        const today = new Date();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${month}.${day}`;
    }

    function getRandomHoliday() {
        const todayKey = getTodayKey();
        const holidaysList = holidaysData[todayKey];
        
        if (!holidaysList || holidaysList.length === 0) {
            return {
                name: "Сегодня особенных праздников нет",
                description: "Но ты всегда можешь придумать свой! ✨"
            };
        }
        
        let randomIndex;
        do {
            randomIndex = Math.floor(Math.random() * holidaysList.length);
        } while (randomIndex === currentHolidayIndex && holidaysList.length > 1);
        currentHolidayIndex = randomIndex;
        
        return {
            name: `🎉 ${holidaysList[randomIndex]}`,
            description: `Праздник, который стоит отметить!`
        };
    }

    function updateHoliday() {
        const contentDiv = document.getElementById('holidayContent');
        const holiday = getRandomHoliday();
        
        contentDiv.innerHTML = `
            <div class="holiday-name">${escapeHtml(holiday.name)}</div>
            <div class="holiday-desc">${escapeHtml(holiday.description)}</div>
        `;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Запуск
    updateHoliday();
    document.getElementById('refreshBtn').addEventListener('click', updateHoliday);

    // Telegram Web App
    if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#1a2a3a');
        Telegram.WebApp.setBackgroundColor('#1a2a3a');
    }
</script>
</body>
</html>

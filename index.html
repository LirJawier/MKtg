<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Случайный праздник — Ну..</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 40px 30px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .title {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFB6C1, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .sub {
            font-size: 16px;
            color: #b0c4de;
            margin-bottom: 25px;
        }

        .holiday-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            padding: 25px 20px;
            margin-bottom: 20px;
            min-height: 200px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .holiday-name {
            font-size: 24px;
            font-weight: bold;
            color: #FFD966;
            word-break: break-word;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .holiday-desc {
            font-size: 14px;
            color: #9cb8d4;
            margin-top: 12px;
        }

        .holiday-country {
            font-size: 13px;
            color: #FFB6C1;
            margin-top: 15px;
            font-weight: 500;
        }

        .refresh-btn {
            background: #FF6B6B;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .refresh-btn:hover {
            background: #ff5252;
            transform: scale(1.02);
        }

        .footer-note {
            font-size: 10px;
            color: #608aac;
            margin-top: 20px;
        }

        .loader {
            border: 3px solid #3a5a6e;
            border-top: 3px solid #FFB6C1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">Ну..</div>
    <div class="sub">сегодня где-то праздник</div>

    <div class="holiday-box" id="holidayBox">
        <div id="holidayContent">
            <div class="loader"></div>
            <div class="holiday-desc">Выбираем страну и праздник...</div>
        </div>
    </div>

    <button class="refresh-btn" id="refreshBtn">
        <span>🌍</span> Случайная страна и праздник
    </button>
    <div class="footer-note">
        📅 Источник: Calendarific • праздники со всего мира
    </div>
</div>

<script>
    // ⚠️ ВСТАВЬТЕ ВАШ API-КЛЮЧ ОТ CALENDARIFIC
    const CALENDARIFIC_KEY = "zFoIOvM3hXj4CXcGvwzxsoUhOWhdnmkf";
    
    const countriesList = [
        { code: "RU", name: "Россия" },
        { code: "US", name: "США" },
        { code: "GB", name: "Великобритания" },
        { code: "DE", name: "Германия" },
        { code: "FR", name: "Франция" },
        { code: "IT", name: "Италия" },
        { code: "ES", name: "Испания" },
        { code: "CA", name: "Канада" },
        { code: "AU", name: "Австралия" },
        { code: "BR", name: "Бразилия" },
        { code: "IN", name: "Индия" },
        { code: "JP", name: "Япония" },
        { code: "KR", name: "Южная Корея" },
        { code: "MX", name: "Мексика" },
        { code: "ZA", name: "ЮАР" },
        { code: "NL", name: "Нидерланды" },
        { code: "SE", name: "Швеция" },
        { code: "NO", name: "Норвегия" }
    ];

    let lastCountryIndex = -1;

    async function getRandomHoliday() {
        let randomIndex;
        do {
            randomIndex = Math.floor(Math.random() * countriesList.length);
        } while (randomIndex === lastCountryIndex && countriesList.length > 1);
        lastCountryIndex = randomIndex;
        
        const country = countriesList[randomIndex];
        
        const today = new Date();
        const year = today.getFullYear();
        
        // Запрашиваем праздники за ВЕСЬ год, а не за конкретный день
        const url = `https://calendarific.com/api/v2/holidays?api_key=${CALENDARIFIC_KEY}&country=${country.code}&year=${year}`;
        
        try {
            console.log(`Запрос к API для ${country.name}: ${url}`);
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.meta && data.meta.code === 200) {
                let holidays = data.response.holidays;
                
                if (holidays && holidays.length > 0) {
                    // Фильтруем праздники, которые ещё не прошли
                    const todayStr = today.toISOString().split('T')[0];
                    const upcomingHolidays = holidays.filter(h => h.date.iso >= todayStr);
                    
                    if (upcomingHolidays.length > 0) {
                        // Сортируем по дате и берём ближайший
                        upcomingHolidays.sort((a, b) => a.date.iso.localeCompare(b.date.iso));
                        const nearestHoliday = upcomingHolidays[0];
                        
                        // Форматируем дату
                        const holidayDate = new Date(nearestHoliday.date.iso);
                        const formattedDate = holidayDate.toLocaleDateString('ru-RU');
                        
                        let description = nearestHoliday.description || `Праздник в ${country.name}`;
                        if (nearestHoliday.date.iso === todayStr) {
                            description = `Сегодня! ${description}`;
                        } else {
                            description = `${formattedDate} — ${description}`;
                        }
                        
                        return {
                            success: true,
                            name: nearestHoliday.name,
                            description: description,
                            country: country.name
                        };
                    }
                }
            }
            
            // Если праздников нет, показываем сообщение
            return {
                success: true,
                name: "Ближайших праздников пока нет",
                description: `Но в ${country.name} всегда есть повод для радости! ✨`,
                country: country.name
            };
            
        } catch (error) {
            console.error('Ошибка API:', error);
            const localHolidays = [
                { name: "Международный день счастья", desc: "Улыбнись и поделись радостью! 😊" },
                { name: "День хорошего настроения", desc: "Сегодня точно будет отличный день! 🌈" },
                { name: "Всемирный день дружбы", desc: "Напиши старым друзьям 👫" }
            ];
            const randomLocal = Math.floor(Math.random() * localHolidays.length);
            return {
                success: true,
                name: localHolidays[randomLocal].name,
                description: localHolidays[randomLocal].desc,
                country: "мире"
            };
        }
    }

    async function updateHoliday() {
        const contentDiv = document.getElementById('holidayContent');
        contentDiv.innerHTML = `<div class="loader"></div><div class="holiday-desc">Выбираем случайную страну...</div>`;
        
        const holiday = await getRandomHoliday();
        
        contentDiv.innerHTML = `
            <div class="holiday-name">🎉 ${escapeHtml(holiday.name)}</div>
            <div class="holiday-desc">${escapeHtml(holiday.description)}</div>
            <div class="holiday-country">🌍 ${escapeHtml(holiday.country)}</div>
        `;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', function() {
        updateHoliday();
    });
    
    document.getElementById('refreshBtn').addEventListener('click', function() {
        updateHoliday();
    });

    if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#1a2a3a');
        Telegram.WebApp.setBackgroundColor('#1a2a3a');
    }
</script>
</body>
</html>
